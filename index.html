<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WST Assignment</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: url('bg1.gif') no-repeat center center fixed;
            background-size: cover;
            animation: panBackground 70s infinite alternate ease-in-out;
        }

        .card {
            background-color: #ffffff;
            color: #1a1a1a;
            padding: 60px; 
            width: 400px;
            border-radius: 40px;
            text-align: center;
            transition: all 1.5s cubic-bezier(0.16, 1, 0.3, 1);
            animation: float 4s ease-in-out infinite;
            position: relative;
            overflow: hidden; 
            border: 2px solid transparent;
        }

        /* The Glowing Cyan Orb Border */
        .card::before {
            content: "";
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            /* Fixed Cyan gradient */
            background: conic-gradient(transparent, #00f2ff, transparent 20%);
            animation: rotate 2s linear infinite;
            z-index: -1;
        }

        /* Inner mask to keep the card background clean */
        .card::after {
            content: "";
            position: absolute;
            inset: 3px;
            border-radius: 38px;
            background: inherit;
            z-index: -1;
        }

        @keyframes rotate { 100% { transform: rotate(360deg); } }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-15px); } 100% { transform: translateY(0px); } }

        h1 { font-weight: 700; margin-bottom: 30px; letter-spacing: -0.5px; }

        button {
            background: #1a1a1a;
            color: #ffffff;
            border: none;
            padding: 18px 40px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        button:hover { background: #333; transform: scale(1.05); }

        table { margin: 40px auto 0; width: 100%; border-collapse: collapse; }
        td { padding: 12px 0; font-weight: 300; }
        .label { font-weight: 700; width: 50%; text-align: left; }
        .value { width: 50%; text-align: right; transition: opacity 0.2s ease; }

        .animate-zoom { animation: pulseBackground 0.5s ease-out; }
        @keyframes pulseBackground { 0% { background-size: 100%; } 50% { background-size: 105%; } 100% { background-size: 100%; } }
        @keyframes panBackground { from { background-position: 50% 50%; } to { background-position: 60% 60%; } }
    </style>
</head>
<body>

    <div class="card">
        <h1>Interactive</h1>
        <button onclick="changeColor()">Click Me!</button>

        <table>
            <tr><td class="label">Color</td><td id="colorDisplay" class="value">White</td></tr>
            <tr><td class="label">Interactions</td><td id="clickCount" class="value">0</td></tr>
        </table>
    </div>

    <script>
        let count = 0;
        function changeColor() {
            const colorData = {
                "#ffffff": "White", "#2c3e50": "Midnight", "#34495e": "Slate", "#7f8c8d": "Steel",
                "#8e44ad": "Deep Plum", "#2980b9": "Ocean", "#16a085": "Emerald",
                "#27ae60": "Nephritis", "#f39c12": "Orange", "#d35400": "Pumpkin",
                "#c0392b": "Pomegranate", "#bdc3c7": "Silver", "#9b59b6": "Amethyst",
                "#1abc9c": "Turquoise", "#e67e22": "Carrot", "#3498db": "Peter River",
                "#e74c3c": "Alizarin", "#f1c40f": "Sun Flower", "#ecf0f1": "Clouds"
            };

            let keys = Object.keys(colorData);
            let randomHex = keys[Math.floor(Math.random() * keys.length)];
            
            let card = document.querySelector('.card');
            
            // 1. Update Card Background only
            card.style.backgroundColor = randomHex;
            
            // Text Contrast Check
            card.style.color = (randomHex === "#ffffff" || randomHex === "#f1c40f" || randomHex === "#bdc3c7" || randomHex === "#ecf0f1") ? "#1a1a1a" : "#ffffff";
            
            // 2. Fade text
            let display = document.getElementById("colorDisplay");
            display.style.opacity = 0;
            setTimeout(() => {
                display.innerText = colorData[randomHex];
                display.style.opacity = 1;
            }, 200);

            // 3. Trigger pulse
            document.body.classList.remove('animate-zoom');
            void document.body.offsetWidth; 
            document.body.classList.add('animate-zoom');
            
            document.getElementById("clickCount").innerText = ++count;
        }
    </script>
</body>
</html>
